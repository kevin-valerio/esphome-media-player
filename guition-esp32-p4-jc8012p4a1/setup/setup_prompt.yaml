# =============================================================================
# SETUP PROMPT (no media player entity configured)
# =============================================================================

obj:
  id: setup_prompt
  x: 0
  y: 0
  width: 1280
  height: 800
  bg_color: 0x000000
  bg_opa: 100%
  radius: 0
  border_width: 0
  pad_all: 0
  scrollable: false
  scrollbar_mode: "off"
  hidden: true
  widgets:
    - obj:
        align: center
        width: 700
        height: SIZE_CONTENT
        bg_opa: 0%
        border_width: 0
        pad_all: 0
        scrollable: false
        layout:
          type: flex
          flex_flow: COLUMN
          flex_align_main: center
          flex_align_cross: center
          pad_row: 20
        widgets:
          - label:
              text_font: icon_font_setup
              text: $icon_cast
              text_color: 0xFFFFFF
          - label:
              text: "Media Player"
              text_font: roboto_light40_font
              text_color: 0xFFFFFF
              width: 700
              text_align: center
          - label:
              text: "Set the media player entity\nyou want to control in\ndevice settings"
              text_font: roboto30_font
              text_color: 0x888888
              width: 700
              text_align: center
              pad_top: 8
