# =============================================================================
# LOADING SCREEN (shown at boot until WiFi/grace period)
# =============================================================================
# Full-screen overlay, visible by default. Hidden when connected or
# when grace period ends. Status and progress updated from network.yaml.
# =============================================================================

obj:
  id: loading_screen
  x: 0
  y: 0
  width: 1280
  height: 800
  bg_color: 0x000000
  bg_opa: 100%
  radius: 0
  border_width: 0
  pad_all: 0
  scrollable: false
  scrollbar_mode: "off"
  hidden: false
  widgets:
    - obj:
        align: center
        width: 700
        height: SIZE_CONTENT
        bg_opa: 0%
        border_width: 0
        pad_all: 0
        scrollable: false
        layout:
          type: flex
          flex_flow: COLUMN
          flex_align_main: center
          flex_align_cross: center
          pad_row: 40
        widgets:
          - label:
              text: "Starting up"
              text_font: roboto_light40_font
              text_color: 0xFFFFFF
              width: 700
              text_align: center
          - bar:
              id: loading_progress_bar
              width: 75
              height: 4
              bg_color: 0x333333
              bg_opa: 100%
              radius: 3
              min_value: 0
              max_value: 100
              value: 0
              indicator:
                bg_color: 0xFFFFFF
                radius: 3
