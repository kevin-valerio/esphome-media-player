# =============================================================================
# HOME ASSISTANT SETUP PROMPT (WiFi connected, HA not yet)
# =============================================================================
# Shown after WiFi connects but before HA API connects.
# Hidden by api on_client_connected; shown by on_client_disconnected.
# =============================================================================

obj:
  id: ha_setup_prompt
  x: 0
  y: 0
  width: 480
  height: 480
  bg_color: 0x000000
  bg_opa: 100%
  radius: 0
  border_width: 0
  pad_left: 30
  pad_right: 30
  scrollable: false
  scrollbar_mode: "off"
  hidden: true
  layout:
    type: flex
    flex_flow: COLUMN
    flex_align_main: center
    flex_align_cross: center
    pad_row: 16
  widgets:
    - label:
        text_font: $icon_font
        text: $icon_ha
        text_color: 0xFFFFFF
    - label:
        text: "Home Assistant"
        text_font: roboto_light40_font
        text_color: 0xFFFFFF
        width: 420
        text_align: center
    - label:
        id: ha_setup_instructions
        text: "Add this device in\nSettings > Devices > ESPHome"
        text_font: roboto30_font
        text_color: 0x888888
        width: 420
        text_align: center
        pad_top: 8
